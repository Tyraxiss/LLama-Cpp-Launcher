name: Update v1.0.2 Release Notes

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest

    steps:
      - name: Update release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $body = @'
          ## LLama C++ Launcher v1.0.2

          ### Changed
          - Renamed the preset panel from "Quick Presets" to "Use-Case Presets".
          - Renamed presets around user intent: Code: Precise, Code: Quick, Chat: Balanced, Writing: Story, Research: Long, Character: RP, Gemma 4: Code, Gemma 4: Writing, Qwen 3.6: Code, and Qwen 3.6: Writing.
          - Updated preset descriptions so users can choose by task instead of sampling terminology.
          - Updated the Help tab's preset documentation to explain the Gemma 4 and Qwen 3.6 tuning choices.

          ### Tuning
          - Updated Gemma 4 presets to use recommended Gemma defaults: temperature 1.0, top-p 0.95, top-k 64, no min-p filtering, and no extra repeat or presence penalties.
          - Kept Qwen 3.6 Code aligned with Qwen precise coding/WebDev guidance: temperature 0.6, top-p 0.95, top-k 20, min-p 0, and presence penalty 0.
          - Kept Qwen 3.6 Writing aligned with Qwen general thinking-mode guidance: temperature 1.0, top-p 0.95, top-k 20, min-p 0, and presence penalty 1.5.
          - Adjusted generic code and writing presets for clearer default behavior across non-model-specific GGUFs.

          ### Fixed
          - Downgraded the transitive Rust http-body lock entry from 1.0.2 to 1.0.1 so local release builds resolve against the available crates index.

          Full changelog: https://github.com/Tyraxiss/LLama-Cpp-Launcher/blob/main/CHANGELOG.md
          '@

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "User-Agent" = "release-notes-sync"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/Tyraxiss/LLama-Cpp-Launcher/releases/tags/v1.0.2"
          $payload = @{ body = $body } | ConvertTo-Json
          Invoke-RestMethod -Method Patch -Headers $headers -Uri $release.url -Body $payload -ContentType "application/json"
